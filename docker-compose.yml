services:
  backend:
    build: ./server
    container_name: backend-service
    ports:
      - "3001:3001"
    networks:
      - app-network

  frontend:
    build: ./client
    container_name: frontend-service
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge