services:
  backend:
    build: ./server
    container_name: backend-service
    ports:
      - "3001:3001"
    environment:
      - POSTGRES_HOST=iep_engine_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=iep_engine
    networks:
      - iep-internal

  frontend:
    build: ./client
    container_name: frontend-service
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:3001
    networks:
      - iep-internal

networks:
  iep-internal:
    external: true
